<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termómetro del Clima Organizacional — UTEL</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--ink:#0d0d1a;--gold:#c9a84c;--toxic:#ff4757;--neutral:#ffa502;--positive:#2ed573;--muted:#7a7a9a;--border:rgba(201,168,76,0.18);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--ink);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:16px 12px 24px;
  position:relative;
  overflow-x:hidden;
}
body::before{content:'';position:fixed;top:-40%;left:-20%;width:80vw;height:80vw;background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-30%;right:-10%;width:60vw;height:60vw;background:radial-gradient(circle,rgba(46,213,115,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;}

.container{max-width:480px;width:100%;position:relative;z-index:1;animation:fadeUp 0.6s ease both;margin:0 auto;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* HEADER */
.header-card{background:linear-gradient(145deg,#1a1a2e,#16213e);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:16px 18px 14px;text-align:center;position:relative;overflow:hidden;}
.header-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--toxic),var(--neutral),var(--positive));}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo-wrap img{height:26px;filter:brightness(0) invert(1);opacity:0.92;}
.badge-utel{background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);color:var(--gold);font-size:0.62rem;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;padding:4px 10px;border-radius:20px;}
.header-icon{font-size:2.2rem;margin-bottom:6px;display:block;filter:drop-shadow(0 0 14px rgba(201,168,76,0.5));animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.header-card h1{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:#fff;line-height:1.2;margin-bottom:4px;}
.header-card h1 span{color:var(--gold);}
.header-sub{font-size:0.75rem;color:rgba(255,255,255,0.5);}

/* THERMO BAR */
.thermo-strip{display:flex;height:5px;gap:2px;padding:0 18px;background:#1a1a2e;}
.thermo-seg{flex:1;border-radius:3px;opacity:0.2;transition:opacity 0.5s,transform 0.3s;}
.thermo-seg.lit{opacity:1;transform:scaleY(1.4);}
.thermo-seg:nth-child(1){background:var(--toxic)}
.thermo-seg:nth-child(2){background:#ff6b35}
.thermo-seg:nth-child(3){background:var(--neutral)}
.thermo-seg:nth-child(4){background:#7bed9f}
.thermo-seg:nth-child(5){background:var(--positive)}

/* BODY */
.body-card{background:#fff;border:1px solid #e8e4f0;border-top:none;border-radius:0 0 18px 18px;padding:18px 16px 18px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}

/* PROGRESS */
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.progress-track{flex:1;height:3px;background:#ede8f8;border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#6a0dad,var(--gold));border-radius:10px;transition:width 0.5s cubic-bezier(.23,1,.32,1);width:0%;}
.progress-label{font-size:0.7rem;font-weight:600;color:var(--muted);white-space:nowrap;}

/* EMPRESA TAG */
.empresa-tag{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#1a1a2e,#16213e);color:var(--gold);font-size:0.62rem;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:10px;border:1px solid rgba(201,168,76,0.25);}

/* SITUATION */
.situation-card{background:linear-gradient(135deg,#f8f6ff,#fff8ec);border:1.5px solid #ede8f8;border-radius:12px;padding:14px 14px;margin-bottom:14px;position:relative;overflow:hidden;}
.situation-card::before{content:'C';position:absolute;top:-8px;left:10px;font-family:'Playfair Display',serif;font-size:4rem;color:rgba(106,13,173,0.07);line-height:1;pointer-events:none;}
.situation-text{font-size:0.87rem;color:#1a1a2e;line-height:1.6;font-weight:500;position:relative;z-index:1;}

/* Q LABEL */
.q-label{display:flex;align-items:center;gap:6px;font-size:0.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
.q-label i{color:var(--gold);}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.option{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:11px;border:1.5px solid transparent;cursor:pointer;transition:all 0.22s cubic-bezier(.23,1,.32,1);font-size:0.86rem;font-weight:600;}
.option-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;transition:transform 0.22s;}
.option:hover .option-icon{transform:scale(1.12) rotate(-5deg);}
.option-text{flex:1;}
.option-badge{font-size:0.62rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:2px 7px;border-radius:7px;}

.opt-toxic{background:#fff5f6;border-color:#ffd0d4;color:#c0392b;}
.opt-toxic .option-icon{background:#ffe0e3;color:var(--toxic);}
.opt-toxic .option-badge{background:#ffe0e3;color:var(--toxic);}
.opt-toxic:hover,.opt-toxic.selected{border-color:var(--toxic);background:#fff0f1;box-shadow:0 4px 16px rgba(255,71,87,0.13);transform:translateY(-1px);}

.opt-neutral{background:#fffbf0;border-color:#ffe9b0;color:#d68910;}
.opt-neutral .option-icon{background:#fff3cc;color:var(--neutral);}
.opt-neutral .option-badge{background:#fff3cc;color:#c47a0a;}
.opt-neutral:hover,.opt-neutral.selected{border-color:var(--neutral);background:#fff8e6;box-shadow:0 4px 16px rgba(255,165,2,0.13);transform:translateY(-1px);}

.opt-positive{background:#f0fff6;border-color:#b8f5d4;color:#1a7a40;}
.opt-positive .option-icon{background:#ccf7e3;color:#1db954;}
.opt-positive .option-badge{background:#ccf7e3;color:#18a349;}
.opt-positive:hover,.opt-positive.selected{border-color:var(--positive);background:#e8fff2;box-shadow:0 4px 16px rgba(46,213,115,0.13);transform:translateY(-1px);}

/* FEEDBACK */
.feedback{display:none;padding:11px 13px;border-radius:10px;font-size:0.8rem;line-height:1.5;margin-bottom:12px;font-weight:500;animation:slideIn 0.3s ease both;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.feedback.correct{background:linear-gradient(135deg,#e8fff2,#f0fff6);border-left:3px solid var(--positive);color:#1a7a40;}
.feedback.incorrect{background:linear-gradient(135deg,#fff0f1,#fff5f6);border-left:3px solid var(--toxic);color:#c0392b;}

/* NEXT BTN */
#next-btn{display:none;width:100%;padding:11px;background:linear-gradient(135deg,#1a1a2e,#2d1b69);color:white;border:1px solid rgba(201,168,76,0.3);border-radius:11px;font-size:0.87rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.22s;}
#next-btn:hover{box-shadow:0 6px 20px rgba(45,27,105,0.3);transform:translateY(-1px);}

/* RESULT */
#result{display:none;animation:fadeUp 0.5s ease both;}
.result-header{text-align:center;padding:6px 0 16px;}
.result-big-icon{font-size:3.2rem;display:block;margin-bottom:8px;animation:bounceIn 0.5s cubic-bezier(.23,1,.32,1) both;}
@keyframes bounceIn{from{transform:scale(0.4);opacity:0}60%{transform:scale(1.12)}to{transform:scale(1);opacity:1}}
.result-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:900;color:#1a1a2e;margin-bottom:4px;}
.result-sub{font-size:0.78rem;color:var(--muted);}

.score-section{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:16px;margin:14px 0;border:1px solid rgba(201,168,76,0.2);}
.score-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.score-label-text{font-size:0.65rem;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.8px;}
.score-number{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--gold);}
.score-track{height:8px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;margin-bottom:8px;}
.score-fill{height:100%;border-radius:10px;transition:width 1.4s cubic-bezier(.23,1,.32,1);width:0%;}

.score-stats{display:flex;gap:8px;margin-top:10px;}
.stat-pill{flex:1;text-align:center;padding:8px 6px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);}
.stat-pill i{font-size:0.95rem;margin-bottom:3px;display:block;}
.stat-pill span{font-size:0.62rem;color:rgba(255,255,255,0.5);display:block;}
.stat-pill strong{font-size:0.82rem;color:white;font-weight:700;}

.result-desc{font-size:0.82rem;color:#444;line-height:1.6;text-align:center;margin-bottom:14px;padding:0 2px;}
.divider{height:1px;background:linear-gradient(90deg,transparent,#ede8f8,transparent);margin:14px 0;}

/* SHARE */
.share-label{text-align:center;font-size:0.65rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
.share-label i{color:var(--gold);margin-right:4px;}
.share-btns{display:flex;gap:7px;margin-bottom:12px;}
.share-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 3px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:700;transition:all 0.2s;}
.share-btn:hover{transform:translateY(-2px);filter:brightness(1.08);}
.btn-twitter{background:#000;color:#fff;}
.btn-facebook{background:#1877f2;color:#fff;}
.btn-whatsapp{background:#25d366;color:#fff;}
.btn-copy{background:#f1f5f9;color:#1a1a2e;border:1.5px solid #e2e8f0;}
.btn-copy.copied{background:#e8fff2;color:#1a7a40;border-color:#2ed573;}
.share-btn i{font-size:0.85rem;}

.restart-btn{width:100%;padding:11px;background:linear-gradient(135deg,#1a1a2e,#2d1b69);color:white;border:1px solid rgba(201,168,76,0.3);border-radius:11px;font-size:0.87rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.22s;}
.restart-btn:hover{box-shadow:0 6px 20px rgba(45,27,105,0.3);transform:translateY(-1px);}
</style>
</head>
<body>
<div class="container">
  <div class="header-card">
    <div class="header-top">
      <div class="logo-wrap">
        <img src="https://i.postimg.cc/FKz4sz2C/logoutelsinfondo.png" alt="UTEL">
      </div>
      <div class="badge-utel"><i class="fa-solid fa-graduation-cap"></i> &nbsp;UTEL</div>
    </div>
    <span class="header-icon">🌡️</span>
    <h1>Termómetro del <span>Clima</span> Organizacional</h1>
    <p class="header-sub">¿Sabes identificar un ambiente laboral? ¡Demuéstralo!</p>
  </div>

  <div class="thermo-strip">
    <div class="thermo-seg" id="seg1"></div>
    <div class="thermo-seg" id="seg2"></div>
    <div class="thermo-seg" id="seg3"></div>
    <div class="thermo-seg" id="seg4"></div>
    <div class="thermo-seg" id="seg5"></div>
  </div>

  <div class="body-card">
    <div class="progress-row">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="progress-label" id="progress-label">1 / 6</span>
    </div>

    <div id="quiz">
      <div class="empresa-tag">
        <i class="fa-solid fa-building"></i>
        <span id="empresa-name">Empresa</span>
      </div>
      <div class="situation-card">
        <p class="situation-text" id="situation-text"></p>
      </div>
      <div class="q-label">
        <i class="fa-solid fa-magnifying-glass"></i>
        ¿Cómo clasificas este clima?
      </div>
      <div class="options">
        <div class="option opt-toxic" onclick="responder('toxico')">
          <div class="option-icon">🔥</div>
          <div class="option-text">Clima Tóxico</div>
          <div class="option-badge">Tóxico</div>
        </div>
        <div class="option opt-neutral" onclick="responder('neutro')">
          <div class="option-icon">⚖️</div>
          <div class="option-text">Clima Neutro</div>
          <div class="option-badge">Neutro</div>
        </div>
        <div class="option opt-positive" onclick="responder('positivo')">
          <div class="option-icon">🌱</div>
          <div class="option-text">Clima Positivo</div>
          <div class="option-badge">Positivo</div>
        </div>
      </div>
      <div class="feedback" id="feedback"></div>
      <button id="next-btn" onclick="siguiente()">Continuar &nbsp;→</button>
    </div>

    <div id="result">
      <div class="result-header">
        <span class="result-big-icon" id="result-icon"></span>
        <div class="result-title" id="result-title"></div>
        <div class="result-sub" id="result-sub"></div>
      </div>
      <div class="score-section">
        <div class="score-top">
          <div class="score-label-text"><i class="fa-solid fa-temperature-half"></i> &nbsp;Temperatura del diagnóstico</div>
          <div class="score-number" id="score-pct"></div>
        </div>
        <div class="score-track">
          <div class="score-fill" id="score-fill"></div>
        </div>
        <div class="score-stats">
          <div class="stat-pill">
            <i class="fa-solid fa-circle-check" style="color:#2ed573"></i>
            <strong id="stat-correct">0</strong>
            <span>Correctas</span>
          </div>
          <div class="stat-pill">
            <i class="fa-solid fa-circle-xmark" style="color:#ff4757"></i>
            <strong id="stat-wrong">0</strong>
            <span>Incorrectas</span>
          </div>
          <div class="stat-pill">
            <i class="fa-solid fa-star" style="color:#c9a84c"></i>
            <strong id="stat-rank"></strong>
            <span>Nivel</span>
          </div>
        </div>
      </div>
      <p class="result-desc" id="result-desc"></p>
      <div class="divider"></div>
      <div class="share-label"><i class="fa-solid fa-share-nodes"></i> Comparte tu resultado</div>
      <div class="share-btns">
        <button class="share-btn btn-twitter" onclick="compartirTwitter()">
          <i class="fa-brands fa-x-twitter"></i> X
        </button>
        <button class="share-btn btn-facebook" onclick="compartirFacebook()">
          <i class="fa-brands fa-facebook-f"></i> Facebook
        </button>
        <button class="share-btn btn-whatsapp" onclick="compartirWhatsapp()">
          <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </button>
        <button class="share-btn btn-copy" id="copy-btn" onclick="copiarLink()">
          <i class="fa-solid fa-link"></i> Copiar
        </button>
      </div>
      <button class="restart-btn" onclick="reiniciar()">
        <i class="fa-solid fa-rotate-right"></i> &nbsp; Jugar de nuevo
      </button>
    </div>
  </div>
</div>

<script>
const situaciones = [
  {
    empresa:"Grupo Bimbo — Ciudad de México",
    texto:"El gerente felicita públicamente a su equipo cada semana, organiza desayunos mensuales y tiene una política de puertas abiertas para escuchar a sus colaboradores.",
    respuesta:"positivo",
    explicacion:"El reconocimiento constante, la comunicación abierta y los espacios de convivencia son señales claras de un clima organizacional positivo."
  },
  {
    empresa:"Empresa manufacturera — Monterrey",
    texto:"Los empleados deben pedir permiso para ir al baño, no pueden hablar entre ellos durante el trabajo y el jefe revisa su celular personal al inicio de cada turno.",
    respuesta:"toxico",
    explicacion:"El exceso de control, la falta de privacidad y la desconfianza hacia los empleados son indicadores claros de un clima organizacional tóxico."
  },
  {
    empresa:"Startup de tecnología — Guadalajara",
    texto:"Los empleados tienen mesas asignadas pero pueden trabajar desde casa dos días a la semana. No hay bonos, pero tampoco hay horas extra forzadas.",
    respuesta:"neutro",
    explicacion:"Hay flexibilidad básica pero sin incentivos ni señales claras de bienestar. Es un ambiente neutro: ni inspira ni daña."
  },
  {
    empresa:"Cadena de retail — OXXO",
    texto:"Los supervisores gritan frente a los clientes cuando un cajero comete un error. Los empleados evitan hacer preguntas por miedo a represalias.",
    respuesta:"toxico",
    explicacion:"La humillación pública y el miedo como mecanismo de control son signos inequívocos de un clima tóxico que afecta la productividad y el bienestar."
  },
  {
    empresa:"Hospital privado — CDMX",
    texto:"El personal de enfermería rota turnos de forma justa, tiene acceso a psicólogo gratuito y la dirección realiza encuestas de satisfacción laboral cada trimestre.",
    respuesta:"positivo",
    explicacion:"La equidad en turnos, el apoyo emocional y la retroalimentación constante reflejan una cultura que prioriza el bienestar del colaborador."
  },
  {
    empresa:"Constructora — Puebla",
    texto:"Los trabajadores reciben su pago puntual y tienen equipo de seguridad básico, pero nadie sabe cuáles son sus metas ni reciben retroalimentación de su desempeño.",
    respuesta:"neutro",
    explicacion:"Se cumplen los mínimos laborales, pero la falta de comunicación y objetivos claros genera incertidumbre. Un clima neutro que puede mejorar con liderazgo."
  }
];

let actual=0,puntaje=0,respondido=false;

function cargar(){
  const s=situaciones[actual];
  document.getElementById("empresa-name").textContent=s.empresa;
  document.getElementById("situation-text").textContent=s.texto;
  document.getElementById("progress-label").textContent=`${actual+1} / ${situaciones.length}`;
  document.getElementById("progress-fill").style.width=`${(actual/situaciones.length)*100}%`;
  document.getElementById("feedback").style.display="none";
  document.getElementById("next-btn").style.display="none";
  document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
  respondido=false;
  actualizarThermo();
}

function actualizarThermo(){
  const p=puntaje/situaciones.length;
  for(let i=1;i<=5;i++) document.getElementById(`seg${i}`).classList.toggle("lit",(i/5)<=(p+0.01));
}

function responder(tipo){
  if(respondido)return;
  respondido=true;
  const s=situaciones[actual];
  const ok=s.respuesta===tipo;
  if(ok)puntaje++;
  document.querySelectorAll(".option").forEach(opt=>{
    const cls=tipo==='toxico'?'opt-toxic':tipo==='neutro'?'opt-neutral':'opt-positive';
    if(opt.classList.contains(cls))opt.classList.add("selected");
  });
  const fb=document.getElementById("feedback");
  fb.className="feedback "+(ok?"correct":"incorrect");
  fb.innerHTML=`<i class="fa-solid ${ok?'fa-circle-check':'fa-circle-xmark'}"></i> ${s.explicacion}`;
  fb.style.display="block";
  const nb=document.getElementById("next-btn");
  nb.style.display="block";
  nb.innerHTML=actual<situaciones.length-1
    ?'<i class="fa-solid fa-arrow-right"></i> &nbsp; Siguiente situación'
    :'<i class="fa-solid fa-flag-checkered"></i> &nbsp; Ver resultado final';
  actualizarThermo();
}

function siguiente(){
  actual++;
  if(actual<situaciones.length){cargar();}else{mostrarResultado();}
}

function mostrarResultado(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("result").style.display="block";
  document.getElementById("progress-fill").style.width="100%";
  document.getElementById("progress-label").textContent="¡Listo!";
  for(let i=1;i<=5;i++)document.getElementById(`seg${i}`).classList.add("lit");
  const pct=Math.round((puntaje/situaciones.length)*100);
  const wrong=situaciones.length-puntaje;
  let icon,titulo,sub,desc,color,rank;
  if(pct>=85){
    icon="🏆";titulo="¡Experto en Clima Organizacional!";sub="Diagnóstico de élite";rank="Experto";
    desc="Tu capacidad para identificar ambientes laborales es sobresaliente. Tienes el perfil ideal para liderar iniciativas de bienestar organizacional.";
    color="linear-gradient(90deg,#2ed573,#1db954)";
  } else if(pct>=60){
    icon="🌤️";titulo="Buen Diagnóstico";sub="Vas por buen camino";rank="Avanzado";
    desc="Tienes una base sólida para identificar el clima organizacional. Con práctica podrás detectar incluso los casos más sutiles.";
    color="linear-gradient(90deg,#ffa502,#f39c12)";
  } else {
    icon="📚";titulo="¡Sigue Aprendiendo!";sub="Hay áreas de oportunidad";rank="En progreso";
    desc="El clima organizacional tiene muchos matices. Repasa los conceptos de bienestar laboral, liderazgo y cultura empresarial para mejorar.";
    color="linear-gradient(90deg,#ff6b6b,#ff4757)";
  }
  document.getElementById("result-icon").textContent=icon;
  document.getElementById("result-title").textContent=titulo;
  document.getElementById("result-sub").textContent=sub;
  document.getElementById("result-desc").textContent=desc;
  document.getElementById("score-pct").textContent=`${pct}%`;
  document.getElementById("stat-correct").textContent=puntaje;
  document.getElementById("stat-wrong").textContent=wrong;
  document.getElementById("stat-rank").textContent=rank;
  const fill=document.getElementById("score-fill");
  fill.style.background=color;
  setTimeout(()=>{fill.style.width=`${pct}%`;},120);
}

function compartirTwitter(){
  const pct=Math.round((puntaje/situaciones.length)*100);
  const rank=pct>=85?"Experto":pct>=60?"Avanzado":"En progreso";
  const texto=`🌡️ Obtuve ${pct}% en el Termómetro del Clima Organizacional de UTEL. Mi nivel: ${rank}. ¿Tú qué resultado obtienes?`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(texto)}&url=${encodeURIComponent('https://maravilla9.github.io/clima_org/')}`, '_blank');
}

function compartirFacebook(){
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent('https://maravilla9.github.io/clima_org/')}`, '_blank');
}

function compartirWhatsapp(){
  const pct=Math.round((puntaje/situaciones.length)*100);
  const rank=pct>=85?"Experto":pct>=60?"Avanzado":"En progreso";
  const texto=`🌡️ *Termómetro del Clima Organizacional - UTEL*

Obtuve *${pct}%* y nivel *${rank}*.
¿Tú qué resultado obtienes?
👉 https://maravilla9.github.io/clima_org/`;
  window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
}

function copiarLink(){
  navigator.clipboard.writeText('https://maravilla9.github.io/clima_org/').then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Copiado!';
    setTimeout(()=>{
      btn.classList.remove('copied');
      btn.innerHTML='<i class="fa-solid fa-link"></i> Copiar';
    }, 2500);
  });
}

function reiniciar(){
  actual=0;puntaje=0;
  document.getElementById("quiz").style.display="block";
  document.getElementById("result").style.display="none";
  for(let i=1;i<=5;i++)document.getElementById(`seg${i}`).classList.remove("lit");
  cargar();
}
window.onload=cargar;
</script>
